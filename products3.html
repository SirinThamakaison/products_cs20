<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Products Task 4 Filter</title>
    <style type="text/css">
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .product-card {
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 10px;
        }
        #result {
            margin-top: 15px;
        }
        button {
            padding: 5px 10px;
            margin-right: 5px;
        }
        #filterResult {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Product List</h1>
    <button id="loadBtn">Load Products</button>
    <div id="result"></div>

    <select id="categorySelect">
        <option value="">Select category</option>
    </select>
    <button id="filterBtn">Filter</button>
    <div id="filterResult"></div>

    <script>
        var productsData = [];

        function loadProducts() {
            fetch("products.json")
            .then(function(res) { return res.text(); })
            .then(function(data) {
                productsData = JSON.parse(data);
                var html = "";
                var i;
                for (i = 0; i < productsData.length; i++) {
                    var p = productsData[i];
                    html += '<div class="product-card">';
                    html += '<h3>' + p.name + '</h3>';
                    html += '<div>' + p.description + '</div>';
                    html += '<div>Price: $' + p.price + '</div>';
                    html += '<div>Categories: ' + p.categories.join(", ") + '</div>';
                    html += '</div>';
                }
                document.getElementById("result").innerHTML = html;
            })
            .catch(function(error) {
                document.getElementById("result").innerHTML = "Could not load products.";
            });
        }

        document.getElementById("loadBtn").onclick = loadProducts;

        fetch("products.json")
        .then(function(res) { return res.text(); })
        .then(function(data) {
            productsData = JSON.parse(data);
            var categories = [];
            var j, k;
            for (j = 0; j < productsData.length; j++) {
                for (k = 0; k < productsData[j].categories.length; k++) {
                    var cat = productsData[j].categories[k];
                    if (categories.indexOf(cat) === -1) categories.push(cat);
                }
            }
            categories.sort();
            var select = document.getElementById("categorySelect");
            select.innerHTML = '<option value="">Select category</option>';
            for (j = 0; j < categories.length; j++) {
                var opt = document.createElement("option");
                opt.value = categories[j];
                opt.textContent = categories[j];
                select.appendChild(opt);
            }
        })
        .catch(function(error) {
            document.getElementById("filterResult").innerHTML = "Could not load products.";
        });

        document.getElementById("filterBtn").onclick = function() {
            var selected = document.getElementById("categorySelect").value;
            if (selected === "") {
                document.getElementById("filterResult").innerHTML = "<p>Pick a category first.</p>";
                return;
            }
            var names = [];
            var i;
            for (i = 0; i < productsData.length; i++) {
                if (productsData[i].categories.indexOf(selected) !== -1) {
                    names.push(productsData[i].name);
                }
            }
            var listHtml = "<p>Products in " + selected + ":</p><ul>";
            for (i = 0; i < names.length; i++) {
                listHtml += "<li>" + names[i] + "</li>";
            }
            listHtml += "</ul>";
            document.getElementById("filterResult").innerHTML = listHtml;
        };
    </script>
</body>
</html>
